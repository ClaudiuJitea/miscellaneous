<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neon Brick Breaker 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            background: #050510;
        }
        
        canvas { display: block; }
        
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }
        
        .stat {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 16px 28px;
            border-radius: 16px;
            color: #fff;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #00f0ff, #0080ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }
        
        #powerup-indicator {
            position: fixed;
            top: 50%;
            right: 24px;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 16px;
            color: #fff;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        
        #powerup-indicator.active { opacity: 1; }
        
        #powerup-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        #powerup-bar {
            width: 100px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        
        #powerup-progress {
            height: 100%;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            border-radius: 3px;
            transition: width 0.1s linear;
        }
        
        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(5,5,16,0.95);
            backdrop-filter: blur(30px);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        .screen.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .screen h1 {
            font-size: clamp(40px, 8vw, 80px);
            font-weight: 800;
            color: #fff;
            margin-bottom: 12px;
            letter-spacing: -2px;
        }
        
        .screen h1 span {
            background: linear-gradient(135deg, #00f0ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .screen p {
            color: rgba(255,255,255,0.6);
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .btn {
            margin-top: 40px;
            padding: 18px 56px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 100px;
            background: linear-gradient(135deg, #00f0ff, #0080ff);
            color: #050510;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px rgba(0,240,255,0.5);
        }
        
        #instructions {
            margin-top: 40px;
            display: flex;
            gap: 32px;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
        }
        
        #instructions span {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        #instructions kbd {
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 6px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat">
            <div class="stat-value" id="score">0</div>
            <div class="stat-label">Score</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="lives">3</div>
            <div class="stat-label">Lives</div>
        </div>
    </div>
    
    <div id="powerup-indicator">
        <div id="powerup-name">MULTI-BALL</div>
        <div id="powerup-bar"><div id="powerup-progress"></div></div>
    </div>
    
    <div id="start-screen" class="screen active">
        <h1>NEON <span>BREAKER</span></h1>
        <p>A modern 3D brick breaker experience</p>
        <button class="btn" id="start-btn">Play Now</button>
        <div id="instructions">
            <span><kbd>MOUSE</kbd> Move Paddle</span>
            <span><kbd>CLICK</kbd> Launch Ball</span>
            <span><kbd>P</kbd> Pause</span>
        </div>
    </div>
    
    <div id="gameover-screen" class="screen">
        <h1 id="gameover-title">GAME OVER</h1>
        <p>Final Score: <span id="final-score">0</span></p>
        <button class="btn" id="restart-btn">Play Again</button>
    </div>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
