<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D Snake Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --accent-primary: #00f2ff;
      --accent-secondary: #ff00ea;
      --bg-deep: #050510;
      --glass: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    body {
      margin: 0;
      overflow: hidden;
      background-color: var(--bg-deep);
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      user-select: none;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 40px;
      left: 40px;
      z-index: 100;
      pointer-events: none;
    }

    .stats-card {
      background: var(--glass);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      padding: 15px 25px;
      border-radius: 15px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
    }

    #score-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      letter-spacing: 2px;
      color: var(--accent-primary);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    #score {
      font-family: 'Orbitron', sans-serif;
      font-size: 32px;
      font-weight: 700;
      text-shadow: 0 0 15px var(--accent-primary);
      transition: transform 0.1s ease;
      display: inline-block;
    }

    #game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 200;
      display: none;
      background: rgba(5, 5, 20, 0.8);
      backdrop-filter: blur(20px);
      padding: 60px;
      border-radius: 30px;
      border: 1px solid var(--accent-secondary);
      box-shadow: 0 0 50px rgba(255, 0, 234, 0.2);
    }

    #game-over h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 56px;
      margin: 0 0 10px 0;
      background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    #game-over p {
      font-size: 20px;
      margin-bottom: 30px;
      opacity: 0.8;
      letter-spacing: 1px;
    }

    .btn {
      padding: 15px 40px;
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: bold;
      color: #ffffff;
      background: transparent;
      border: 2px solid var(--accent-primary);
      border-radius: 5px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: 0.5s;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      background: var(--accent-primary);
      color: var(--bg-deep);
      box-shadow: 0 0 30px var(--accent-primary);
    }

    #controls {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 300;
      background: rgba(0, 0, 0, 0.3);
      padding: 10px 20px;
      border-radius: 20px;
      backdrop-filter: blur(5px);
    }

    .kbd {
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      margin: 0 4px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* Polish overlays */
    #overlay-vignette {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: radial-gradient(circle, transparent 50%, rgba(0, 0, 0, 0.5) 100%);
      z-index: 50;
    }

    #overlay-scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: linear-gradient(to bottom,
          rgba(18, 16, 16, 0) 50%,
          rgba(0, 0, 0, 0.1) 50%);
      background-size: 100% 4px;
      z-index: 51;
      opacity: 0.3;
    }
  </style>
</head>

<body>
  <div id="game-container">
    <div id="ui">
      <div class="stats-card">
        <div id="score-label">Neural Logic Units</div>
        <div id="score">0000</div>
      </div>
      <div id="active-powers" style="margin-top: 20px; pointer-events: none;"></div>
    </div>
    <div id="game-over">
      <h1>Critical Error</h1>
      <p>System Integrity Compromised. Units Collected: <span id="final-score">0</span></p>
      <button id="restart-btn" class="btn">Reboot System</button>
    </div>
    <div id="controls">
      <span class="kbd">W</span> <span class="kbd">A</span> <span class="kbd">S</span> <span class="kbd">D</span> or
      <span class="kbd">Arrows</span> to Navigate Flow
    </div>
    <div id="overlay-vignette"></div>
    <div id="overlay-scanlines"></div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    const GRID_SIZE = 20;
    const CELL_SIZE = 1;
    const COLORS = {
      snakeHead: 0x00f2ff,
      snakeBody: 0x00a2ff,
      food: 0xff00ea,
      ground: 0x050515,
      grid: 0x1a1a3a,
      border: 0x00f2ff,
      powerTurbo: 0xffff00,
      powerSlow: 0x00ff00,
      powerShield: 0x00ffff
    };

    const POWER_UP_TYPES = {
      TURBO: { color: COLORS.powerTurbo, duration: 5000, label: 'TURBO' },
      SLOW: { color: COLORS.powerSlow, duration: 8000, label: 'SLOW-MO' },
      SHIELD: { color: COLORS.powerShield, duration: 7000, label: 'SHIELD' }
    };

    let scene, camera, renderer, composer;
    let tableGroup, particles;
    let snake = [];
    let snakePositions = []; // Store targets for smooth movement
    let snakeDirection = { x: 1, z: 0 };
    let nextDirection = { x: 1, z: 0 };
    let food = null;
    let foodGridPos = { x: 0, z: 0 };
    let score = 0;
    let gameRunning = true;
    let lastMoveTime = 0;
    let baseMoveInterval = 150;
    let currentMoveInterval = 150;
    let moveAlpha = 0; // For interpolation

    let powerUp = null;
    let powerUpGridPos = { x: 0, z: 0 };
    let activeEffects = {
      turbo: 0,
      slow: 0,
      shield: 0
    };

    // Simple Audio engine
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(freq, duration = 0.1, type = 'sine') {
      try {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) { console.error(e); }
    }

    const snakeGeometry = new THREE.BoxGeometry(CELL_SIZE * 0.9, CELL_SIZE * 0.9, CELL_SIZE * 0.9);
    const snakeHeadMaterial = new THREE.MeshStandardMaterial({
      color: COLORS.snakeHead,
      emissive: COLORS.snakeHead,
      emissiveIntensity: 0.8,
      roughness: 0.1,
      metalness: 0.8
    });
    const snakeBodyMaterial = new THREE.MeshStandardMaterial({
      color: COLORS.snakeBody,
      emissive: COLORS.snakeBody,
      emissiveIntensity: 0.3,
      roughness: 0.2,
      metalness: 0.6
    });

    const foodGeometry = new THREE.SphereGeometry(CELL_SIZE * 0.4, 32, 32);
    const foodMaterial = new THREE.MeshStandardMaterial({
      color: COLORS.food,
      emissive: COLORS.food,
      emissiveIntensity: 1.5,
      roughness: 0.1,
      metalness: 0.9
    });

    const powerUpGeometry = new THREE.IcosahedronGeometry(CELL_SIZE * 0.45, 0);
    const powerUpMaterials = {
      TURBO: new THREE.MeshStandardMaterial({ color: COLORS.powerTurbo, emissive: COLORS.powerTurbo, emissiveIntensity: 2 }),
      SLOW: new THREE.MeshStandardMaterial({ color: COLORS.powerSlow, emissive: COLORS.powerSlow, emissiveIntensity: 2 }),
      SHIELD: new THREE.MeshStandardMaterial({ color: COLORS.powerShield, emissive: COLORS.powerShield, emissiveIntensity: 2 })
    };

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050510);
      scene.fog = new THREE.Fog(0x050510, 15, 45);

      camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
      camera.position.set(0, 22, 22);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ReinhardToneMapping;
      renderer.toneMappingExposure = 1.5;
      document.getElementById('game-container').appendChild(renderer.domElement);

      tableGroup = new THREE.Group();
      scene.add(tableGroup);

      createLights();
      createGround();
      createParticles();
      createSnake();
      spawnFood();

      setupPostProcessing();

      document.addEventListener('keydown', handleKeyDown);
      document.getElementById('restart-btn').addEventListener('click', restartGame);
      window.addEventListener('resize', onWindowResize);

      renderer.setAnimationLoop(animate);
    }

    function setupPostProcessing() {
      const renderScene = new RenderPass(scene, camera);
      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        1.5, // strength
        0.4, // radius
        0.85 // threshold
      );

      composer = new EffectComposer(renderer);
      composer.addPass(renderScene);
      composer.addPass(bloomPass);

      const outputPass = new OutputPass();
      composer.addPass(outputPass);
    }

    function createParticles() {
      const geometry = new THREE.BufferGeometry();
      const vertices = [];
      for (let i = 0; i < 5000; i++) {
        vertices.push(
          THREE.MathUtils.randFloatSpread(100),
          THREE.MathUtils.randFloatSpread(100),
          THREE.MathUtils.randFloatSpread(100)
        );
      }
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      const material = new THREE.PointsMaterial({
        color: 0x4444aa,
        size: 0.1,
        transparent: true,
        opacity: 0.8
      });
      particles = new THREE.Points(geometry, material);
      scene.add(particles);
    }

    function createLights() {
      const ambientLight = new THREE.AmbientLight(0x606080, 1.2);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
      directionalLight.position.set(10, 20, 10);
      directionalLight.castShadow = true;
      directionalLight.shadow.mapSize.width = 2048;
      directionalLight.shadow.mapSize.height = 2048;
      directionalLight.shadow.camera.near = 0.5;
      directionalLight.shadow.camera.far = 50;
      directionalLight.shadow.camera.left = -15;
      directionalLight.shadow.camera.right = 15;
      directionalLight.shadow.camera.top = 15;
      directionalLight.shadow.camera.bottom = -15;
      scene.add(directionalLight);

      const pointLight1 = new THREE.PointLight(0x00ffff, 1, 30);
      pointLight1.position.set(-8, 5, -8);
      scene.add(pointLight1);

      const pointLight2 = new THREE.PointLight(0xff00ff, 1, 30);
      pointLight2.position.set(8, 5, 8);
      scene.add(pointLight2);

      const snakeLight = new THREE.PointLight(0xffffff, 0.5, 15);
      snakeLight.position.set(0, 5, 0);
      scene.add(snakeLight);
      window.snakeLight = snakeLight;
    }

    function createGround() {
      const groundGeometry = new THREE.PlaneGeometry(GRID_SIZE * CELL_SIZE, GRID_SIZE * CELL_SIZE);
      const groundMaterial = new THREE.MeshStandardMaterial({
        color: COLORS.ground,
        roughness: 0.8,
        metalness: 0.2
      });
      const ground = new THREE.Mesh(groundGeometry, groundMaterial);
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      tableGroup.add(ground);

      const gridHelper = new THREE.GridHelper(GRID_SIZE * CELL_SIZE, GRID_SIZE, COLORS.grid, COLORS.grid);
      gridHelper.position.y = 0.01;
      tableGroup.add(gridHelper);

      // Neon Border
      const borderGeometry = new THREE.BoxGeometry(GRID_SIZE * CELL_SIZE + 0.5, 0.2, 0.2);
      const borderMaterial = new THREE.MeshStandardMaterial({
        color: COLORS.border,
        emissive: COLORS.border,
        emissiveIntensity: 2
      });

      const borders = [
        { x: 0, z: -GRID_SIZE * CELL_SIZE / 2 - 0.1 },
        { x: 0, z: GRID_SIZE * CELL_SIZE / 2 + 0.1 },
        { x: -GRID_SIZE * CELL_SIZE / 2 - 0.1, z: 0 },
        { x: GRID_SIZE * CELL_SIZE / 2 + 0.1, z: 0 }
      ];

      borders.forEach(pos => {
        const border = new THREE.Mesh(borderGeometry, borderMaterial);
        border.position.set(pos.x, 0.1, pos.z);
        if (pos.x !== 0) border.rotation.y = Math.PI / 2;
        tableGroup.add(border);
      });
    }

    function createSnake() {
      snake.forEach(segment => tableGroup.remove(segment));
      snake = [];
      snakePositions = [];

      // Center the snake in the middle of the grid
      // For a 20x20 grid, centers are at -9.5 to 9.5
      // Let's start at x=0.5, z=0.5 (near the center)
      const startX = 0.5;
      const startZ = 0.5;

      for (let i = 0; i < 3; i++) {
        const material = i === 0 ? snakeHeadMaterial : snakeBodyMaterial;
        const segment = new THREE.Mesh(snakeGeometry, material);
        const pos = { x: startX - i * CELL_SIZE, z: startZ };
        segment.position.set(pos.x, CELL_SIZE / 2, pos.z);
        segment.castShadow = true;
        segment.receiveShadow = true;
        tableGroup.add(segment);
        snake.push(segment);
        // Current and target positions for smooth interp
        snakePositions.push({ curr: { ...pos }, next: { ...pos } });
      }

      snakeDirection = { x: 1, z: 0 };
      nextDirection = { x: 1, z: 0 };
      lastMoveTime = performance.now();
    }

    function spawnFood() {
      if (food) {
        tableGroup.remove(food);
      }

      let validPosition = false;
      let gridX, gridZ;
      let x, z;

      while (!validPosition) {
        gridX = Math.floor(Math.random() * GRID_SIZE);
        gridZ = Math.floor(Math.random() * GRID_SIZE);
        x = gridX - GRID_SIZE / 2 + 0.5;
        z = gridZ - GRID_SIZE / 2 + 0.5;

        validPosition = !snake.some(segment =>
          Math.abs(segment.position.x - x) < 0.5 && Math.abs(segment.position.z - z) < 0.5
        );
      }

      foodGridPos = { x: gridX, z: gridZ };
      food = new THREE.Mesh(foodGeometry, foodMaterial);
      food.position.set(x, CELL_SIZE / 2, z);
      food.castShadow = true;
      tableGroup.add(food);

      // 30% chance to spawn a power-up when food is spawned
      if (!powerUp && Math.random() < 0.3) {
        spawnPowerUp();
      }
    }

    function spawnPowerUp() {
      if (powerUp) tableGroup.remove(powerUp);

      const keys = Object.keys(POWER_UP_TYPES);
      const typeKey = keys[Math.floor(Math.random() * keys.length)];
      const type = POWER_UP_TYPES[typeKey];

      let validPosition = false;
      let gridX, gridZ;
      let x, z;

      while (!validPosition) {
        gridX = Math.floor(Math.random() * GRID_SIZE);
        gridZ = Math.floor(Math.random() * GRID_SIZE);
        x = gridX - GRID_SIZE / 2 + 0.5;
        z = gridZ - GRID_SIZE / 2 + 0.5;

        validPosition = !snake.some(segment =>
          Math.abs(segment.position.x - x) < 0.5 && Math.abs(segment.position.z - z) < 0.5
        ) && (gridX !== foodGridPos.x || gridZ !== foodGridPos.z);
      }

      powerUpGridPos = { x: gridX, z: gridZ };
      powerUp = new THREE.Mesh(powerUpGeometry, powerUpMaterials[typeKey]);
      powerUp.userData = { type: typeKey };
      powerUp.position.set(x, CELL_SIZE / 2, z);
      powerUp.castShadow = true;
      tableGroup.add(powerUp);
    }

    function updateActiveEffects() {
      const now = Date.now();
      let interval = baseMoveInterval;
      const powersContainer = document.getElementById('active-powers');
      powersContainer.innerHTML = '';

      Object.keys(activeEffects).forEach(key => {
        const remaining = activeEffects[key] - now;
        if (remaining > 0) {
          if (key === 'turbo') interval = baseMoveInterval * 0.6;
          if (key === 'slow') interval = baseMoveInterval * 1.6;

          const badge = document.createElement('div');
          badge.className = 'stats-card';
          badge.style.marginTop = '10px';
          badge.style.padding = '8px 15px';
          badge.style.fontSize = '12px';
          badge.style.border = `1px solid ${POWER_UP_TYPES[key.toUpperCase()].color.toString(16).padStart(6, '0')}`;
          badge.innerHTML = `<span style="color: #${POWER_UP_TYPES[key.toUpperCase()].color.toString(16).padStart(6, '0')}">${POWER_UP_TYPES[key.toUpperCase()].label}</span> : ${(remaining / 1000).toFixed(1)}s`;
          powersContainer.appendChild(badge);
        } else {
          activeEffects[key] = 0;
        }
      });

      currentMoveInterval = interval;
    }

    function handleKeyDown(event) {
      const key = event.key.toLowerCase();
      const rotation = tableGroup ? tableGroup.rotation.y : 0;
      const cos = Math.cos(rotation);
      const sin = Math.sin(rotation);

      let inputDir;
      if (key === 'w' || key === 'arrowup') {
        inputDir = { x: 0, z: -1 };
      } else if (key === 's' || key === 'arrowdown') {
        inputDir = { x: 0, z: 1 };
      } else if (key === 'a' || key === 'arrowleft') {
        inputDir = { x: -1, z: 0 };
      } else if (key === 'd' || key === 'arrowright') {
        inputDir = { x: 1, z: 0 };
      } else {
        return;
      }

      const localX = inputDir.x * cos - inputDir.z * sin;
      const localZ = inputDir.x * sin + inputDir.z * cos;

      if (Math.abs(localX) > Math.abs(localZ)) {
        const xDir = Math.sign(localX);
        if (snakeDirection.x === 0) {
          nextDirection = { x: xDir, z: 0 };
        }
      } else {
        const zDir = Math.sign(localZ);
        if (snakeDirection.z === 0) {
          nextDirection = { x: 0, z: zDir };
        }
      }
    }

    function moveSnake() {
      snakeDirection = { ...nextDirection };

      const headPos = snakePositions[0].next;
      const newX = headPos.x + snakeDirection.x * CELL_SIZE;
      const newZ = headPos.z + snakeDirection.z * CELL_SIZE;

      const headGridX = Math.round(newX + GRID_SIZE / 2 - 0.5);
      const headGridZ = Math.round(newZ + GRID_SIZE / 2 - 0.5);

      if (headGridX < 0 || headGridX >= GRID_SIZE || headGridZ < 0 || headGridZ >= GRID_SIZE) {
        gameOver();
        return;
      }

      // Self-collision (check against next positions of body)
      if (activeEffects.shield <= 0) {
        for (let i = 1; i < snakePositions.length; i++) {
          if (Math.abs(snakePositions[i].next.x - newX) < 0.1 && Math.abs(snakePositions[i].next.z - newZ) < 0.1) {
            gameOver();
            return;
          }
        }
      }

      // Check for food
      const eating = (headGridX === foodGridPos.x && headGridZ === foodGridPos.z);
      // Check for power-up
      const collecting = (powerUp && headGridX === powerUpGridPos.x && headGridZ === powerUpGridPos.z);

      if (collecting) {
        const typeKey = powerUp.userData.type;
        const type = POWER_UP_TYPES[typeKey];
        activeEffects[typeKey.toLowerCase()] = Date.now() + type.duration;

        tableGroup.remove(powerUp);
        powerUp = null;
        playBeep(880, 0.2, 'square'); // Power up sound
      }

      if (eating) {
        score += 10;
        updateScore();
        spawnFood();

        // Simple pulse effect for the head
        snake[0].scale.set(1.5, 1.5, 1.5);

        // Grow: add new segment at the end
        const lastPos = snakePositions[snakePositions.length - 1].next;
        const segment = new THREE.Mesh(snakeGeometry, snakeBodyMaterial);
        segment.position.set(lastPos.x, CELL_SIZE / 2, lastPos.z);
        segment.castShadow = true;
        tableGroup.add(segment);
        snake.push(segment);
        snakePositions.push({ curr: { ...lastPos }, next: { ...lastPos } });
      }

      // Shift positions
      for (let i = snakePositions.length - 1; i > 0; i--) {
        snakePositions[i].curr = { ...snakePositions[i].next };
        snakePositions[i].next = { ...snakePositions[i - 1].next };
      }
      snakePositions[0].curr = { ...snakePositions[0].next };
      snakePositions[0].next = { x: newX, z: newZ };
    }

    function updateScore() {
      const scoreEl = document.getElementById('score');
      scoreEl.textContent = score.toString().padStart(4, '0');
      // Simple pulse effect
      scoreEl.style.transform = 'scale(1.2)';
      setTimeout(() => scoreEl.style.transform = 'scale(1)', 100);
    }

    function gameOver() {
      gameRunning = false;
      document.getElementById('game-over').style.display = 'block';
      document.getElementById('final-score').textContent = score;
      playBeep(110, 0.5, 'sawtooth'); // Game over sound
    }

    function restartGame() {
      gameRunning = true;
      score = 0;
      updateScore();
      document.getElementById('game-over').style.display = 'none';
      if (powerUp) {
        tableGroup.remove(powerUp);
        powerUp = null;
      }
      activeEffects = { turbo: 0, slow: 0, shield: 0 };
      createSnake();
      spawnFood();
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      if (composer) {
        composer.setSize(window.innerWidth, window.innerHeight);
      }
    }

    function animate(time) {
      updateActiveEffects();

      if (gameRunning) {
        const delta = time - lastMoveTime;
        moveAlpha = Math.min(delta / currentMoveInterval, 1.0);

        if (delta >= currentMoveInterval) {
          moveSnake();
          lastMoveTime = time;
          moveAlpha = 0;
        }

        // Smooth Interpolation
        for (let i = 0; i < snake.length; i++) {
          const pos = snakePositions[i];
          if (pos) {
            snake[i].position.x = pos.curr.x + (pos.next.x - pos.curr.x) * moveAlpha;
            snake[i].position.z = pos.curr.z + (pos.next.z - pos.curr.z) * moveAlpha;

            // Simple scale effect for head
            if (i === 0) {
              const pulse = Math.sin(time * 0.01) * 0.05 + 1;
              snake[i].scale.set(pulse, pulse, pulse);

              // Shield visual feedback
              if (activeEffects.shield > 0) {
                snake[i].material.emissiveIntensity = 2 + Math.sin(time * 0.02);
              } else {
                snake[i].material.emissiveIntensity = 0.8;
              }

              if (window.snakeLight) {
                const worldPos = new THREE.Vector3(snake[i].position.x, 3, snake[i].position.z);
                worldPos.applyAxisAngle(new THREE.Vector3(0, 1, 0), tableGroup.rotation.y);
                window.snakeLight.position.copy(worldPos);
              }
            }
          }
        }
      }

      if (food) {
        food.rotation.y = time * 0.003;
        food.position.y = CELL_SIZE / 2 + Math.sin(time * 0.005) * 0.2;
      }

      if (tableGroup) {
        tableGroup.rotation.y = time * 0.0001;
      }

      if (powerUp) {
        powerUp.rotation.x = time * 0.002;
        powerUp.rotation.z = time * 0.003;
        powerUp.position.y = CELL_SIZE / 2 + Math.cos(time * 0.004) * 0.15;
      }

      if (particles) {
        particles.rotation.y = time * 0.00005;
        particles.rotation.z = time * 0.00002;
      }

      if (composer) {
        composer.render();
      } else {
        renderer.render(scene, camera);
      }
    }

    init();
  </script>
</body>
